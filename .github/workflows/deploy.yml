# Deploy static site to Firebase Hosting on push to master.
# Requires repo secret: FIREBASE_TOKEN (from `firebase login:ci` on your machine).

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-firebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and build (production)
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: >-
          npx firebase-tools@13
          deploy
          --only hosting:evergreen
          --project the-evergreen-dev
          --non-interactive
