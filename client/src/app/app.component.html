<div class="site">
  <header class="site-header">
    <div class="site-header__inner">
      <a routerLink="/bio" class="site-brand" aria-label="Home">
        <span class="site-brand__name">Paul Spears</span>
        <span class="site-brand__tag">Consultative technologist · Entrepreneur · Builder</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a
          routerLink="/bio"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          >About</a
        >
        <a routerLink="/speaking" routerLinkActive="is-active">Speaking</a>
        <a routerLink="/posts" routerLinkActive="is-active">Writing</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__note">
        A quiet note: I live with Marfan syndrome, a connective tissue condition that shapes more of
        life than most folks realize.
        <a
          class="site-footer__link"
          href="https://www.marfan.org/"
          target="_blank"
          rel="noopener noreferrer"
          >Learn more about Marfan syndrome</a
        >
        — including signs that are easy to miss.
      </p>
      <p class="site-footer__signoff">God bless.</p>
    </div>
  </footer>
</div>
