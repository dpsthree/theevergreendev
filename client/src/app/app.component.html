<div class="site">
  <header class="site-header">
    <div class="site-header__inner">
      <a routerLink="/bio" class="site-brand" aria-label="Home">
        <span class="site-brand__name">Paul Spears</span>
        <span class="site-brand__tag">The Evergreen Dev</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a
          routerLink="/bio"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
          >About</a
        >
        <a routerLink="/speaking" routerLinkActive="is-active">Speaking</a>
        <a routerLink="/posts" routerLinkActive="is-active">Writing</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <router-outlet></router-outlet>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__note">
        Engineering leadership, curriculum, and hands-on delivery.
      </p>
    </div>
  </footer>
</div>
