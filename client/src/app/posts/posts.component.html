<article class="page posts-page">
  <header class="page-hero">
    <p class="page-eyebrow">Writing</p>
    <h1 class="page-title">Articles &amp; guides</h1>
    <p class="page-lead">
      Long-form notes on Angular performance, runtime behavior, and front-end
      practice — published on the Angular blog and Oasis Digital.
    </p>
  </header>

  <ul class="post-list">
    <li *ngFor="let post of posts" class="post-list__item">
      <a
        class="post-link"
        [href]="post.url"
        target="_blank"
        rel="noopener noreferrer"
      >
        <span class="post-link__title">{{ post.title }}</span>
        <span class="post-link__meta" aria-hidden="true">Read externally →</span>
      </a>
    </li>
  </ul>
</article>
